<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #141E30, #243B55);
    color: white;
}

/* NAVBAR */
nav {
    background: rgba(0,0,0,0.4);
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav h1 {
    font-size: 22px;
}

nav button {
    padding: 8px 15px;
    background: #00c6ff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

/* CONTAINER */
.container {
    width: 90%;
    margin: 30px auto;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    backdrop-filter: blur(8px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* SEARCH */
.search-box {
    margin-bottom: 20px;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: none;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: rgba(0,0,0,0.3);
}

tr:hover {
    background: rgba(255,255,255,0.05);
}

button.action {
    padding: 5px 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin: 2px;
}

.issue { background: orange; }
.return { background: green; color: white; }
.delete { background: red; color: white; }

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
}

.modal-content input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
}

.modal-content button {
    width: 100%;
    padding: 8px;
    background: #243B55;
    color: white;
    border: none;
    border-radius: 4px;
}
</style>
</head>

<body>

<nav>
    <h1>📚 Smart Library Management</h1>
    <button onclick="openModal()">+ Add Book</button>
</nav>

<div class="container">

    <div class="dashboard">
        <div class="card">
            <h2 id="totalBooks">0</h2>
            <p>Total Books</p>
        </div>
        <div class="card">
            <h2 id="availableBooks">0</h2>
            <p>Available</p>
        </div>
        <div class="card">
            <h2 id="issuedBooks">0</h2>
            <p>Issued</p>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by title or author..." onkeyup="searchBooks()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="bookTable"></tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal" id="bookModal">
    <div class="modal-content">
        <h3>Add New Book</h3>
        <input type="text" id="title" placeholder="Book Title">
        <input type="text" id="author" placeholder="Author">
        <button onclick="addBook()">Add Book</button>
    </div>
</div>

<script>

let books = JSON.parse(localStorage.getItem("library")) || [];

function saveData() {
    localStorage.setItem("library", JSON.stringify(books));
}

function updateDashboard() {
    document.getElementById("totalBooks").innerText = books.length;
    document.getElementById("availableBooks").innerText = books.filter(b => !b.issued).length;
    document.getElementById("issuedBooks").innerText = books.filter(b => b.issued).length;
}

function renderBooks(filtered = books) {
    let table = document.getElementById("bookTable");
    table.innerHTML = "";

    filtered.forEach((book, index) => {
        table.innerHTML += `
            <tr>
                <td>${book.title}</td>
                <td>${book.author}</td>
                <td>${book.issued ? "Issued" : "Available"}</td>
                <td>
                    <button class="action ${book.issued ? "return" : "issue"}" 
                        onclick="toggleIssue(${index})">
                        ${book.issued ? "Return" : "Issue"}
                    </button>
                    <button class="action delete" onclick="deleteBook(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });

    updateDashboard();
}

function addBook() {
    let title = document.getElementById("title").value;
    let author = document.getElementById("author").value;

    if (!title || !author) {
        alert("Please fill all fields");
        return;
    }

    books.push({ title, author, issued: false });
    saveData();
    renderBooks();
    closeModal();
}

function toggleIssue(index) {
    books[index].issued = !books[index].issued;
    saveData();
    renderBooks();
}

function deleteBook(index) {
    if (confirm("Delete this book?")) {
        books.splice(index, 1);
        saveData();
        renderBooks();
    }
}

function searchBooks() {
    let keyword = document.getElementById("searchInput").value.toLowerCase();
    let filtered = books.filter(book =>
        book.title.toLowerCase().includes(keyword) ||
        book.author.toLowerCase().includes(keyword)
    );
    renderBooks(filtered);
}

function openModal() {
    document.getElementById("bookModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("bookModal").style.display = "none";
    document.getElementById("title").value = "";
    document.getElementById("author").value = "";
}

window.onclick = function(event) {
    let modal = document.getElementById("bookModal");
    if (event.target == modal) {
        closeModal();
    }
}

renderBooks();

</script>

</body>
</html>
